name: Package & Release

on:
  push:
    tags:
      - "v*"

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Build extension zip
        run: |
          UUID="rounded-windows@marcosgt.github.io"
          mkdir -p dist
          glib-compile-schemas schemas
          zip -r "dist/${UUID}.shell-extension.zip" \
            extension.js \
            effect.js \
            prefs.js \
            metadata.json \
            stylesheet.css \
            schemas/

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/*.zip
          body: |
            ## Instalación

            1. Descarga el archivo `.zip`
            2. Ve a https://extensions.gnome.org/local/ y usa **Instalar desde archivo**,
               o ejecuta:
               ```bash
               gnome-extensions install rounded-windows@marcosgt.github.io.shell-extension.zip
               ```

            ## Cambios

            Ver CHANGELOG.md en el repositorio para el resumen de esta versión.

            ---
            Para publicar en extensions.gnome.org, sube el `.zip` manualmente en:
            https://extensions.gnome.org/upload/
